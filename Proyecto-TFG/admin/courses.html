<!DOCTYPE html>
<html lang="es">
<head>
<script>if(localStorage.getItem('theme')==='dark'||(!localStorage.getItem('theme')&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursos - Academia Loranca</title>
  <link rel="shortcut icon" href="../imagenes/logo.png" type="image/png">
  <link rel="stylesheet" href="../parte-css/index.css">
  <link rel="stylesheet" href="./admin.css">
  <script src="../parte-logica/api.js"></script>
  <script src="./admin-utils.js"></script>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-wrap"><img src="../imagenes/logo.png" alt="Logo"></div>
      <h2>Academia Loranca</h2>
      <p>Panel Admin</p>
    </div>
    <nav class="sidebar-nav">
      <a href="./dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a>
      <a href="./users.html"><span class="nav-icon">👥</span><span>Usuarios</span></a>
      <a href="./courses.html" class="active"><span class="nav-icon">📚</span><span>Cursos</span></a>
      <a href="./teachers.html"><span class="nav-icon">👨‍🏫</span><span>Profesores</span></a>
      <a href="./messages.html"><span class="nav-icon">✉️</span><span>Mensajes</span></a>
      <a href="./announcements.html"><span class="nav-icon">📢</span><span>Anuncios</span></a>
      <a href="./events.html"><span class="nav-icon">📅</span><span>Eventos</span></a>
      <a href="./orders.html"><span class="nav-icon">📦</span><span>Pedidos</span></a>
      <a href="./db-viewer.html"><span class="nav-icon">🗄️</span><span>Visor BD</span></a>
      <a href="../index.html"><span class="nav-icon">🌐</span><span>Ver web</span></a>
      <a href="#" id="adminThemeToggle" style="border-top:1px solid rgba(255,255,255,0.06);margin-top:auto;padding-top:16px;display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;color:rgba(255,255,255,0.7);text-decoration:none;font-weight:500;font-size:13px;transition:all 0.25s ease;cursor:pointer">
        <span class="nav-icon" id="adminThemeIcon">🌙</span>
        <span id="adminThemeLabel">Modo oscuro</span>
      </a>
      <a href="#" class="logout" id="logoutBtn"><span class="nav-icon">🚪</span><span>Cerrar Sesión</span></a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="main-header">
      <div class="main-header-left">
        <h1>Cursos</h1>
        <div class="breadcrumb">Admin / <span>Cursos</span></div>
      </div>
      <div class="user-badge" id="userBadge">
        <div class="avatar" id="userAvatar">A</div>
        <div class="info">
          <div class="name" id="userName">Admin</div>
          <div class="role">Administrador</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2><span class="card-icon">📚</span> Gesti&oacute;n de cursos</h2>
        <div class="card-toolbar">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Buscar curso..." oninput="renderCourses()">
          </div>
          <button class="btn-primary" onclick="openCreate()">+ Nuevo curso</button>
          <button class="btn btn-secondary" onclick="exportCSV('cursos.csv', ['ID','Nombre','Profesor','Horario','Plazas','Creado'], courses.map(c => [c.id, c.name, c.teacher, c.schedule, c.max_students, c.created_at]))">📥 CSV</button>
        </div>
      </div>
      <div id="coursesTable"><div class="skeleton-card" id="loadingSkeleton">
  <div class="skeleton sk-title"></div>
  <div class="skeleton-row"><div class="skeleton sk-line w60"></div><div class="skeleton sk-line w20"></div><div class="skeleton sk-line w30"></div></div>
  <div class="skeleton-row"><div class="skeleton sk-line w40"></div><div class="skeleton sk-line w30"></div><div class="skeleton sk-line w20"></div></div>
  <div class="skeleton-row"><div class="skeleton sk-line w60"></div><div class="skeleton sk-line w20"></div><div class="skeleton sk-line w30"></div></div>
  <div class="skeleton-row"><div class="skeleton sk-line w40"></div><div class="skeleton sk-line w30"></div><div class="skeleton sk-line w20"></div></div>
  <div class="skeleton-row"><div class="skeleton sk-line w60"></div><div class="skeleton sk-line w20"></div><div class="skeleton sk-line w30"></div></div>
</div></div>
      <div id="coursesPager"></div>
    </div>
  </main>

  <div class="modal-overlay" id="courseModal">
    <div class="modal">
      <h2>➕ Nuevo curso</h2>
      <div class="field"><label>Nombre del curso</label><input type="text" id="editName" placeholder="Ej: Refuerzo Integral - Grupo 1"></div>
      <div class="field"><label>Descripci&oacute;n</label><textarea id="editDescription" rows="3" placeholder="Descripci&oacute;n del curso"></textarea></div>
      <div class="field"><label>Profesor</label><input type="text" id="editTeacher" placeholder="Nombre del profesor"></div>
      <div class="field"><label>Horario</label><input type="text" id="editSchedule" placeholder="Ej: Lunes a Jueves 15:00-20:00"></div>
      <div class="field"><label>M&aacute;ximo de alumnos</label><input type="number" id="editMaxStudents" value="8" min="1"></div>
      <div class="field"><label>Color identificativo</label><input type="color" id="editColor" value="#2a17cf"></div>
      <div class="field"><label>Precio (€/mes)</label><input type="number" id="editPrice" value="49.90" min="0" step="0.01"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" id="saveCourseBtn" onclick="saveCourse()">Guardar curso</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="studentsModal">
    <div class="modal" style="max-width:500px">
      <h2>👥 Alumnos del curso</h2>
      <p id="studentsCourseName" style="color:#64748b;margin-bottom:16px;font-size:14px"></p>
      <div id="studentsList"><p style="color:#94a3b8;text-align:center">Cargando...</p></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeStudentsModal()">Cerrar</button>
      </div>
    </div>
  </div>

  <script>
    let courses = [];
    let editingId = null;
    let coursesPager;

    (async () => {
      if (!API.isLoggedIn()) { window.location.href = '../login.html'; return; }
      const user = API.getUser();
      if (!user || user.role !== 'admin') { window.location.href = '../index.html'; return; }
      document.getElementById('userName').textContent = user.username;
      document.getElementById('userAvatar').textContent = user.username.charAt(0).toUpperCase();
      await loadCourses();

      document.getElementById('logoutBtn').addEventListener('click', (e) => {
        e.preventDefault(); API.logout(); window.location.href = '../index.html';
      });
    })();

    async function loadCourses() {
      try {
        const data = await API.admin.getCourses();
        courses = data.courses;
        coursesPager = createPager('coursesPager', 10, renderCourses);
        renderCourses();
        document.getElementById('loadingSkeleton')?.remove();
      } catch (e) { document.getElementById('loadingSkeleton')?.remove(); showToast('Error al cargar cursos', 'error'); }
    }

    function renderCourses() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = courses.filter(c => c.name.toLowerCase().includes(q));
      const div = document.getElementById('coursesTable');
      if (filtered.length === 0) { div.innerHTML = '<div class="empty"><div class="empty-icon">📚</div><p>No hay cursos</p></div>'; coursesPager.setTotal(0); return; }
      coursesPager.setTotal(filtered.length);
      div.innerHTML = '<div class="table-wrap"><table><thead><tr><th>ID</th><th>Curso</th><th>Profesor</th><th>Horario</th><th>Plazas</th><th>Precio</th><th>Acciones</th></tr></thead><tbody>' +
        coursesPager.getPage(filtered).data.map(c => `
          <tr>
            <td><span class="cell-id">#${c.id}</span></td>
            <td><span class="cell-name" style="color:${c.color || '#2a17cf'}">${c.name}</span></td>
            <td>${c.teacher || '—'}</td>
            <td>${c.schedule || '—'}</td>
            <td>${c.max_students || 8} plazas <span style="font-size:12px;color:${c.enrolled_count >= c.max_students ? '#dc2626' : '#16a34a'}">(${c.enrolled_count || 0})</span></td>
            <td>${c.price ? c.price.toFixed(2).replace('.',',') + ' €' : '—'}</td>
            <td class="actions">
              <button class="btn-icon" onclick="viewStudents(${c.id})" title="Ver alumnos">👥</button>
              <button class="btn-edit btn-icon" onclick="openEdit(${c.id})" title="Editar">✏️</button>
              <button class="btn-delete btn-icon" onclick="deleteCourse(${c.id})" title="Eliminar">🗑️</button>
            </td>
          </tr>
        `).join('') + '</tbody></table></div>';
    }

    function openCreate() {
      editingId = null;
      document.querySelector('#courseModal h2').textContent = '➕ Nuevo curso';
      document.getElementById('saveCourseBtn').textContent = 'Guardar curso';
      ['editName','editDescription','editTeacher','editSchedule'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('editMaxStudents').value = 8;
      document.getElementById('editColor').value = '#2a17cf';
      document.getElementById('editPrice').value = '49.90';
      document.getElementById('courseModal').classList.add('active');
    }

    function openEdit(id) {
      const c = courses.find(x => x.id === id); if (!c) return;
      editingId = id;
      document.querySelector('#courseModal h2').textContent = '✏️ Editar curso';
      document.getElementById('saveCourseBtn').textContent = 'Guardar cambios';
      document.getElementById('editName').value = c.name;
      document.getElementById('editDescription').value = c.description || '';
      document.getElementById('editTeacher').value = c.teacher || '';
      document.getElementById('editSchedule').value = c.schedule || '';
      document.getElementById('editMaxStudents').value = c.max_students || 8;
      document.getElementById('editColor').value = c.color || '#2a17cf';
      document.getElementById('editPrice').value = c.price || '49.90';
      document.getElementById('courseModal').classList.add('active');
    }

    async function saveCourse() {
      const data = {
        name: document.getElementById('editName').value,
        description: document.getElementById('editDescription').value,
        teacher: document.getElementById('editTeacher').value,
        schedule: document.getElementById('editSchedule').value,
        max_students: parseInt(document.getElementById('editMaxStudents').value) || 8,
        color: document.getElementById('editColor').value,
        price: parseFloat(document.getElementById('editPrice').value) || 0
      };
      if (!data.name) { showToast('El nombre del curso es obligatorio', 'error'); return; }
      try {
        if (editingId) {
          const res = await API.admin.updateCourse(editingId, data);
          const idx = courses.findIndex(c => c.id === editingId);
          if (idx >= 0) courses[idx] = res.course;
          showToast('Curso actualizado correctamente', 'success');
        } else {
          const res = await API.admin.createCourse(data);
          courses.push(res.course);
          showToast('Curso creado correctamente', 'success');
        }
        renderCourses();
        closeModal();
      } catch (e) { showToast(e.error || 'Error al guardar', 'error'); }
    }

    async function deleteCourse(id) {
      if (!(await showConfirm('¿Eliminar este curso definitivamente?'))) return;
      try {
        await API.admin.deleteCourse(id);
        courses = courses.filter(c => c.id !== id);
        renderCourses();
        showToast('Curso eliminado', 'success');
      } catch (e) { showToast(e.error || 'Error', 'error'); }
    }

    let viewingCourseId = null;

    async function viewStudents(id) {
      viewingCourseId = id;
      const c = courses.find(x => x.id === id);
      document.getElementById('studentsCourseName').textContent = c ? c.name : '';
      document.getElementById('studentsList').innerHTML = '<p style="color:#94a3b8;text-align:center">Cargando...</p>';
      document.getElementById('studentsModal').classList.add('active');
      try {
        const data = await API.admin.getCourseStudents(id);
        const students = data.students || [];
        const list = document.getElementById('studentsList');
        if (students.length === 0) {
          list.innerHTML = '<div class="empty"><div class="empty-icon">👥</div><p>No hay alumnos inscritos</p></div>';
        } else {
          list.innerHTML = '<div class="table-wrap"><table><thead><tr><th>Usuario</th><th>Email</th><th>Inscrito</th><th></th></tr></thead><tbody>' +
            students.map(s => `
              <tr>
                <td>${s.username}</td>
                <td>${s.email}</td>
                <td style="font-size:13px;color:#94a3b8">${new Date(s.enrolled_at).toLocaleDateString('es-ES')}</td>
                <td><button class="btn-delete btn-icon" onclick="removeStudent(${id},${s.id})" title="Quitar">🗑️</button></td>
              </tr>
            `).join('') + '</tbody></table></div>';
        }
      } catch (e) { document.getElementById('studentsList').innerHTML = `<p style="color:#dc2626;text-align:center">${e.error || 'Error'}</p>`; }
    }

    async function removeStudent(courseId, userId) {
      if (!(await showConfirm('¿Quitar este alumno del curso?'))) return;
      const enrollments = await API.admin.getAll('enrollments');
      const enr = enrollments.find(e => e.user_id === userId && e.course_id === courseId);
      if (!enr) return;
      try {
        await API.admin.deleteEnrollment(enr.id);
        viewStudents(courseId);
        showToast('Alumno eliminado del curso', 'success');
      } catch (e) { showToast(e.error || 'Error', 'error'); }
    }

    function closeStudentsModal() {
      document.getElementById('studentsModal').classList.remove('active');
      viewingCourseId = null;
    }

    function closeModal() { document.getElementById('courseModal').classList.remove('active'); editingId = null; }
    function showToast(msg, type) {
      const t = document.createElement('div'); t.className = 'toast ' + type; t.textContent = msg;
      document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
    }
  </script>
<script>
(function(){
  const btn = document.getElementById('adminThemeToggle');
  const icon = document.getElementById('adminThemeIcon');
  const label = document.getElementById('adminThemeLabel');
  if(btn){
    const isDark = document.documentElement.getAttribute('data-theme')==='dark';
    icon.textContent = isDark ? '☀️' : '🌙';
    label.textContent = isDark ? 'Modo claro' : 'Modo oscuro';
    btn.addEventListener('click', function(e){
      e.preventDefault();
      const dark = document.documentElement.getAttribute('data-theme') !== 'dark';
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      localStorage.setItem('theme', dark ? 'dark' : 'light');
      icon.textContent = dark ? '☀️' : '🌙';
      label.textContent = dark ? 'Modo claro' : 'Modo oscuro';
    });
  }
})();
</script>
</body>
</html>
