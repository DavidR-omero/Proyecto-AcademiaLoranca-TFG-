<!DOCTYPE html>
<html lang="es">
<head>
<script>if(localStorage.getItem('theme')==='dark'||(!localStorage.getItem('theme')&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horarios - Academia Loranca</title>
  <link rel="shortcut icon" href="../imagenes/logo.png" type="image/png">
  <link rel="stylesheet" href="../parte-css/index.css">
  <link rel="stylesheet" href="./admin.css">
  <script src="../parte-logica/api.js"></script>
  <script src="./admin-utils.js"></script>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-wrap"><img src="../imagenes/logo.png" alt="Logo"></div>
      <h2>Academia Loranca</h2>
      <p>Panel Admin</p>
    </div>
    <nav class="sidebar-nav">
      <a href="./dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a>
      <a href="./users.html"><span class="nav-icon">👥</span><span>Usuarios</span></a>
      <a href="./courses.html"><span class="nav-icon">📚</span><span>Cursos</span></a>
      <a href="./messages.html"><span class="nav-icon">✉️</span><span>Mensajes</span></a>
      <a href="./announcements.html"><span class="nav-icon">📢</span><span>Anuncios</span></a>
      <a href="./events.html"><span class="nav-icon">📅</span><span>Eventos</span></a>
      <a href="./orders.html"><span class="nav-icon">📦</span><span>Pedidos</span></a>
      <a href="./schedules.html" class="active"><span class="nav-icon">🕐</span><span>Horarios</span></a>
      <a href="./db-viewer.html"><span class="nav-icon">🗄️</span><span>Visor BD</span></a>
      <a href="../index.html"><span class="nav-icon">🌐</span><span>Ver web</span></a>
      <a href="#" id="adminThemeToggle" style="border-top:1px solid rgba(255,255,255,0.06);margin-top:auto;padding-top:16px;display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;color:rgba(255,255,255,0.7);text-decoration:none;font-weight:500;font-size:13px;transition:all 0.25s ease;cursor:pointer">
        <span class="nav-icon" id="adminThemeIcon">🌙</span>
        <span id="adminThemeLabel">Modo oscuro</span>
      </a>
      <a href="#" class="logout" id="logoutBtn"><span class="nav-icon">🚪</span><span>Cerrar Sesión</span></a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="main-header">
      <div class="main-header-left">
        <h1>Horarios</h1>
        <div class="breadcrumb">Admin / <span>Horarios</span></div>
      </div>
      <div class="user-badge" id="userBadge">
        <div class="avatar" id="userAvatar">A</div>
        <div class="info">
          <div class="name" id="userName">Admin</div>
          <div class="role">Administrador</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2><span class="card-icon">🕐</span>Gestión de horarios</h2>
        <div class="card-toolbar">
          <button class="btn btn-primary" id="addBtn">+ Nuevo horario</button>
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchSched" placeholder="Buscar...">
          </div>
          <button class="btn btn-secondary" onclick="exportCSV('horarios.csv', ['Grupo','Días','Inicio','Fin','Orden'], schedules.map(s => [s.group_name, s.days, s.start_time, s.end_time, s.sort_order]))">📥 CSV</button>
        </div>
      </div>
      <div id="loadingSkeleton" class="skeleton-card">
        <div class="skeleton sk-title"></div>
        <div class="skeleton-row"><div class="skeleton sk-line w60"></div><div class="skeleton sk-line w20"></div><div class="skeleton sk-line w30"></div></div>
        <div class="skeleton-row"><div class="skeleton sk-line w40"></div><div class="skeleton sk-line w30"></div><div class="skeleton sk-line w20"></div></div>
        <div class="skeleton-row"><div class="skeleton sk-line w60"></div><div class="skeleton sk-line w20"></div><div class="skeleton sk-line w30"></div></div>
        <div class="skeleton-row"><div class="skeleton sk-line w40"></div><div class="skeleton sk-line w30"></div><div class="skeleton sk-line w20"></div></div>
        <div class="skeleton-row"><div class="skeleton sk-line w60"></div><div class="skeleton sk-line w20"></div><div class="skeleton sk-line w30"></div></div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Grupo</th><th>Días</th><th>Hora inicio</th><th>Hora fin</th><th>Orden</th><th>Acciones</th></tr>
          </thead>
          <tbody id="schedulesBody"></tbody>
        </table>
      </div>
      <div id="schedPager"></div>
    </div>
  </main>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Nuevo horario</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label>Grupo</label>
          <input id="fGroup" class="form-control" placeholder="ej. Grupo 1 - Isabel">
        </div>
        <div class="form-group">
          <label>Días</label>
          <input id="fDays" class="form-control" placeholder="ej. Lunes a Jueves">
        </div>
        <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label>Hora inicio</label>
            <input id="fStart" class="form-control" placeholder="ej. 15:00">
          </div>
          <div class="form-group">
            <label>Hora fin</label>
            <input id="fEnd" class="form-control" placeholder="ej. 20:00">
          </div>
        </div>
        <div class="form-group">
          <label>Orden</label>
          <input id="fOrder" type="number" class="form-control" value="0" style="width:100px">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modalCancel">Cancelar</button>
        <button class="btn btn-primary" id="modalSave">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    (async () => {
      if (!API.isLoggedIn()) { window.location.href = '../login.html'; return; }
      const user = API.getUser();
      if (!user || user.role !== 'admin') { window.location.href = '../index.html'; return; }
      document.getElementById('userName').textContent = user.username;
      document.getElementById('userAvatar').textContent = user.username.charAt(0).toUpperCase();

      let schedules = [];
      let schedPager;

      async function load() {
        const res = await API.request('/api/admin/schedules');
        schedules = res.schedules;
        schedPager = createPager('schedPager', 10, render);
        render();
        document.getElementById('loadingSkeleton')?.remove();
      }

      function render() {
        const q = document.getElementById('searchSched').value.toLowerCase();
        const filtered = schedules.filter(s => s.group_name.toLowerCase().includes(q) || (s.days && s.days.toLowerCase().includes(q)));
        schedPager.setTotal(filtered.length);
        const tbody = document.getElementById('schedulesBody');
        tbody.innerHTML = schedPager.getPage(filtered).data.map(s => `
          <tr>
            <td><strong>${esc(s.group_name)}</strong></td>
            <td>${esc(s.days)}</td>
            <td>${esc(s.start_time)}</td>
            <td>${esc(s.end_time)}</td>
            <td>${s.sort_order}</td>
            <td class="actions-cell">
              <button class="btn btn-sm btn-secondary" onclick="editSchedule(${s.id})">✏️</button>
              <button class="btn btn-sm btn-danger" onclick="deleteSchedule(${s.id})">🗑️</button>
            </td>
          </tr>
        `).join('');
      }

      function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

      window.editSchedule = async (id) => {
        const s = schedules.find(x => x.id === id);
        if (!s) return;
        document.getElementById('editId').value = id;
        document.getElementById('fGroup').value = s.group_name;
        document.getElementById('fDays').value = s.days;
        document.getElementById('fStart').value = s.start_time;
        document.getElementById('fEnd').value = s.end_time;
        document.getElementById('fOrder').value = s.sort_order;
        document.getElementById('modalTitle').textContent = 'Editar horario';
        document.getElementById('modal').classList.add('active');
      };

      window.deleteSchedule = async (id) => {
        if (!(await showConfirm('¿Eliminar este horario?'))) return;
        await API.request(`/api/admin/schedules/${id}`, { method: 'DELETE' });
        schedules = schedules.filter(s => s.id !== id);
        render();
        showToast('Horario eliminado', 'success');
      };

      document.getElementById('addBtn').onclick = () => {
        document.getElementById('editId').value = '';
        document.getElementById('fGroup').value = '';
        document.getElementById('fDays').value = '';
        document.getElementById('fStart').value = '';
        document.getElementById('fEnd').value = '';
        document.getElementById('fOrder').value = '0';
        document.getElementById('modalTitle').textContent = 'Nuevo horario';
        document.getElementById('modal').classList.add('active');
      };

      document.getElementById('modalClose').onclick = () => document.getElementById('modal').classList.remove('active');
      document.getElementById('modalCancel').onclick = () => document.getElementById('modal').classList.remove('active');
      document.getElementById('modal').onclick = (e) => { if (e.target === e.currentTarget) e.target.classList.remove('active'); };

      document.getElementById('modalSave').onclick = async () => {
        const id = document.getElementById('editId').value;
        const data = {
          group_name: document.getElementById('fGroup').value.trim(),
          days: document.getElementById('fDays').value.trim(),
          start_time: document.getElementById('fStart').value.trim(),
          end_time: document.getElementById('fEnd').value.trim(),
          sort_order: parseInt(document.getElementById('fOrder').value) || 0
        };
        if (!data.group_name) { showToast('El nombre del grupo es obligatorio', 'error'); return; }
        if (id) {
          const res = await API.request(`/api/admin/schedules/${id}`, { method: 'PUT', body: JSON.stringify(data) });
          const idx = schedules.findIndex(s => s.id === parseInt(id));
          if (idx !== -1) schedules[idx] = res.schedule;
          showToast('Horario actualizado', 'success');
        } else {
          const res = await API.request('/api/admin/schedules', { method: 'POST', body: JSON.stringify(data) });
          schedules.push(res.schedule);
          showToast('Horario creado', 'success');
        }
        render();
        document.getElementById('modal').classList.remove('active');
      };

      function showToast(msg, type) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
      }

      await load();
      document.getElementById('searchSched').addEventListener('input', render);
      document.getElementById('logoutBtn').onclick = (e) => { e.preventDefault(); API.logout(); window.location.href = '../index.html'; };
    })();
  </script>
<script>
(function(){
  const btn = document.getElementById('adminThemeToggle');
  const icon = document.getElementById('adminThemeIcon');
  const label = document.getElementById('adminThemeLabel');
  if(btn){
    const isDark = document.documentElement.getAttribute('data-theme')==='dark';
    icon.textContent = isDark ? '☀️' : '🌙';
    label.textContent = isDark ? 'Modo claro' : 'Modo oscuro';
    btn.addEventListener('click', function(e){
      e.preventDefault();
      const dark = document.documentElement.getAttribute('data-theme') !== 'dark';
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      localStorage.setItem('theme', dark ? 'dark' : 'light');
      icon.textContent = dark ? '☀️' : '🌙';
      label.textContent = dark ? 'Modo claro' : 'Modo oscuro';
    });
  }
})();
</script>
</body>
</html>
