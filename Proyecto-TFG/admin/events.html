<!DOCTYPE html>
<html lang="es">
<head>
<script>if(localStorage.getItem('theme')==='dark'||(!localStorage.getItem('theme')&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos - Academia Loranca</title>
  <link rel="shortcut icon" href="../imagenes/logo.png" type="image/png">
  <link rel="stylesheet" href="../parte-css/index.css">
  <link rel="stylesheet" href="./admin.css">
  <script src="../parte-logica/api.js"></script>
  <script src="./admin-utils.js"></script>
  <style>
    .calendar-nav { display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:16px }
    .calendar-nav .btn-nav { background:none;border:none;font-size:28px;cursor:pointer;color:#6a11cb;padding:4px 12px;border-radius:8px;transition:.2s }
    .calendar-nav .btn-nav:hover { background:#f3e8ff }
    .calendar-month { font-size:18px;font-weight:700;color:#1e293b;min-width:200px;text-align:center }
    .calendar-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:4px;background:#f8faff;border-radius:14px;padding:12px;border:1px solid #f1f5f9 }
    .calendar-grid .day-name { text-align:center;font-size:12px;font-weight:700;color:#94a3b8;padding:6px 0;text-transform:uppercase }
    .calendar-grid .day-cell { aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;cursor:pointer;font-size:14px;font-weight:600;color:#1e293b;position:relative;transition:.2s;min-height:50px }
    .calendar-grid .day-cell:hover { background:#eef2ff }
    .calendar-grid .day-cell.other { color:#cbd5e1;cursor:default }
    .calendar-grid .day-cell.other:hover { background:transparent }
    .calendar-grid .day-cell.today { background:#eef2ff;color:#4f46e5;font-weight:800 }
    .calendar-grid .day-cell.past { opacity:.45;cursor:not-allowed }
    .calendar-grid .day-cell.past:hover { background:transparent }
    .calendar-grid .day-cell.future { cursor:pointer }
    .calendar-grid .day-cell.future:hover { background:#eef2ff }
    .calendar-grid .day-cell .event-dots { display:flex;gap:3px;position:absolute;bottom:4px }
    .calendar-grid .day-cell .event-dots span { width:6px;height:6px;border-radius:50% }
    .calendar-grid .day-cell .day-label { font-size:10px;margin-top:2px }
    .calendar-grid .day-cell .day-add {
      position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;
      background:#6a11cb;color:#fff;font-size:10px;font-weight:700;line-height:16px;
      text-align:center;opacity:0;transition:opacity .2s;pointer-events:none;
    }
    .calendar-grid .day-cell.today .day-add,
    .calendar-grid .day-cell.future .day-add { display:block }
    .calendar-grid .day-cell.future:hover .day-add,
    .calendar-grid .day-cell.today:hover .day-add { opacity:1 }
    .calendar-grid .day-cell.past .day-add { display:none }
    .calendar-grid .day-cell.today .day-add { background:#4f46e5 }
    [data-theme="dark"] .calendar-grid .day-cell .day-add { background:#93c5fd;color:#0f172a }
    .day-popup {
      position:absolute;z-index:100;background:#fff;border-radius:14px;padding:16px;
      box-shadow:0 12px 40px rgba(0,0,0,.15);min-width:200px;border:1px solid #e2e8f0;
      animation:popIn .2s ease;display:none;
    }
    .day-popup.show { display:block }
    .day-popup .dp-title { font-size:14px;font-weight:700;color:#1e293b;margin-bottom:8px }
    .day-popup .dp-event { display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;color:#475569;border-bottom:1px solid #f1f5f9 }
    .day-popup .dp-event:last-child { border-bottom:none }
    .day-popup .dp-event .dp-dot { width:8px;height:8px;border-radius:50%;flex-shrink:0 }
    .day-popup .dp-add {
      display:block;margin-top:8px;padding:8px;background:#f0f4ff;border-radius:8px;
      text-align:center;font-size:13px;font-weight:600;color:#6a11cb;cursor:pointer;transition:.2s;border:none;width:100%
    }
    .day-popup .dp-add:hover { background:#e0e7ff }
    @keyframes popIn { from { opacity:0;transform:translateY(8px) scale(.96) } to { opacity:1;transform:translateY(0) scale(1) } }
    [data-theme="dark"] .day-popup { background:var(--bg-card);border-color:var(--border-color) }
    [data-theme="dark"] .day-popup .dp-title { color:var(--text-primary) }
    [data-theme="dark"] .day-popup .dp-event { color:var(--text-secondary);border-bottom-color:var(--border-color) }
    [data-theme="dark"] .day-popup .dp-add { background:rgba(59,130,246,.1);color:#93c5fd }
    [data-theme="dark"] .day-popup .dp-add:hover { background:rgba(59,130,246,.2) }
    [data-theme="dark"] .calendar-grid { background:#1a2332;border-color:#334155 }
    [data-theme="dark"] .calendar-month { color:#f1f5f9 }
    [data-theme="dark"] .calendar-grid .day-cell { color:#f1f5f9 }
    [data-theme="dark"] .calendar-grid .day-cell:hover { background:#1e3a5f }
    [data-theme="dark"] .calendar-grid .day-cell.other { color:#475569 }
    [data-theme="dark"] .calendar-grid .day-cell.other:hover { background:transparent }
    [data-theme="dark"] .calendar-grid .day-cell.today { background:#1e3a5f;color:#93c5fd }
    [data-theme="dark"] .calendar-grid .day-cell.past { opacity:.3 }
    [data-theme="dark"] .calendar-grid .day-cell.past:hover { background:transparent }
    [data-theme="dark"] .calendar-grid .day-cell.future:hover { background:#1e3a5f }
    [data-theme="dark"] .calendar-nav .btn-nav:hover { background:#1e3a5f }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-wrap"><img src="../imagenes/logo.png" alt="Logo"></div>
      <h2>Academia Loranca</h2>
      <p>Panel Admin</p>
    </div>
    <nav class="sidebar-nav">
      <a href="./dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a>
      <a href="./users.html"><span class="nav-icon">👥</span><span>Usuarios</span></a>
      <a href="./courses.html"><span class="nav-icon">📚</span><span>Cursos</span></a>
      <a href="./teachers.html"><span class="nav-icon">👨‍🏫</span><span>Profesores</span></a>
      <a href="./schedules.html"><span class="nav-icon">🕐</span><span>Horarios</span></a>
      <a href="./messages.html"><span class="nav-icon">✉️</span><span>Mensajes</span></a>
      <a href="./announcements.html"><span class="nav-icon">📢</span><span>Anuncios</span></a>
      <a href="./events.html" class="active"><span class="nav-icon">📅</span><span>Eventos</span></a>
      <a href="./orders.html"><span class="nav-icon">📦</span><span>Pedidos</span></a>
      <a href="./db-viewer.html"><span class="nav-icon">🗄️</span><span>Visor BD</span></a>
      <a href="../index.html"><span class="nav-icon">🌐</span><span>Ver web</span></a>
    </nav>
    <div class="sidebar-bottom">
      <a href="#" id="adminThemeToggle">
        <span class="nav-icon" id="adminThemeIcon">🌙</span>
        <span id="adminThemeLabel">Modo oscuro</span>
      </a>
      <a href="#" class="logout" id="logoutBtn"><span class="nav-icon">🚪</span><span>Cerrar Sesión</span></a>
    </div>
  </aside>

  <main class="main-content">
    <div class="main-header">
      <div class="main-header-left">
        <h1>Eventos</h1>
        <div class="breadcrumb">Admin / <span>Calendario y fechas</span></div>
      </div>
      <div class="user-badge" id="userBadge">
        <div class="avatar" id="userAvatar">A</div>
        <div class="info">
          <div class="name" id="userName">Admin</div>
          <div class="role">Administrador</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2><span class="card-icon">📅</span> Calendario de eventos</h2>
        <div class="card-toolbar">
          <button class="btn-primary" onclick="openCreate()">+ Nuevo evento</button>
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchEvents" placeholder="Buscar...">
          </div>
          <button class="btn btn-secondary" onclick="exportCSV('eventos.csv', ['Título','Descripción','Fecha','Hora','Color'], events.map(e => [e.title, e.description, e.event_date, e.event_time, e.color]))">📥 CSV</button>
        </div>
      </div>
      <div class="calendar-nav">
        <button class="btn-nav" onclick="prevMonth()">‹</button>
        <span class="calendar-month" id="calendarMonth"></span>
        <button class="btn-nav" onclick="nextMonth()">›</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <div id="eventsTable" style="margin-top:20px"><div class="skeleton-card" id="loadingSkeleton">
  <div class="skeleton sk-title"></div>
  <div class="skeleton-row"><div class="skeleton sk-line w60"></div><div class="skeleton sk-line w20"></div><div class="skeleton sk-line w30"></div></div>
  <div class="skeleton-row"><div class="skeleton sk-line w40"></div><div class="skeleton sk-line w30"></div><div class="skeleton sk-line w20"></div></div>
  <div class="skeleton-row"><div class="skeleton sk-line w60"></div><div class="skeleton sk-line w20"></div><div class="skeleton sk-line w30"></div></div>
  <div class="skeleton-row"><div class="skeleton sk-line w40"></div><div class="skeleton sk-line w30"></div><div class="skeleton sk-line w20"></div></div>
  <div class="skeleton-row"><div class="skeleton sk-line w60"></div><div class="skeleton sk-line w20"></div><div class="skeleton sk-line w30"></div></div>
</div></div>
      <div id="eventsPager"></div>
    </div>
  </main>

  <div class="modal-overlay" id="eventModal">
    <div class="modal">
      <h2 id="modalTitle">➕ Nuevo evento</h2>
      <div class="field"><label>Título</label><input type="text" id="editTitle" placeholder="Ej: Exámenes finales"></div>
      <div class="field"><label>Descripción</label><textarea id="editDescription" rows="3" placeholder="Descripción del evento"></textarea></div>
      <div class="field"><label>Fecha</label><input type="date" id="editDate"></div>
      <div class="field"><label>Hora (opcional)</label><input type="time" id="editTime"></div>
      <div class="field"><label>Color</label><input type="color" id="editColor" value="#2a17cf"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" id="saveBtn" onclick="saveEvent()">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    let events = [];
    let editingId = null;
    let eventsPager;
    let calMonth = new Date().getMonth();
    let calYear = new Date().getFullYear();

    const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const DAYS = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

    (async () => {
      if (!API.isLoggedIn()) { window.location.href = '../login.html'; return; }
      const user = API.getUser();
      if (!user || user.role !== 'admin') { window.location.href = '../index.html'; return; }
      document.getElementById('userName').textContent = user.username;
      document.getElementById('userAvatar').textContent = user.username.charAt(0).toUpperCase();
      await load();
      document.getElementById('searchEvents').addEventListener('input', render);

      document.getElementById('logoutBtn').addEventListener('click', (e) => {
        e.preventDefault(); API.logout(); window.location.href = '../index.html';
      });
    })();

    async function load() {
      try {
        const data = await API.admin.getEvents();
        events = data.events;
        eventsPager = createPager('eventsPager', 10, render);
        render();
        renderCalendar();
        document.getElementById('loadingSkeleton')?.remove();
      } catch (e) { document.getElementById('loadingSkeleton')?.remove(); showToast('Error al cargar', 'error'); }
    }

    function renderCalendar() {
      const grid = document.getElementById('calendarGrid');
      const monthLabel = document.getElementById('calendarMonth');
      monthLabel.textContent = `${MONTHS[calMonth]} ${calYear}`;

      const firstDay = new Date(calYear, calMonth, 1);
      const lastDay = new Date(calYear, calMonth + 1, 0);
      const startDay = (firstDay.getDay() + 6) % 7;
      const daysInMonth = lastDay.getDate();
      const today = new Date().toISOString().split('T')[0];

      const eventMap = {};
      events.forEach(e => {
        const d = e.event_date;
        if (!eventMap[d]) eventMap[d] = [];
        eventMap[d].push(e);
      });

      let html = DAYS.map(d => `<div class="day-name">${d}</div>`).join('');

      for (let i = 0; i < startDay; i++) {
        html += '<div class="day-cell other"></div>';
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday = dateStr === today;
        const isPast = dateStr < today;
        const dayEvents = eventMap[dateStr] || [];
        const dayClass = isToday ? 'today' : isPast ? 'past' : 'future';
        html += `<div class="day-cell ${dayClass}" onclick="openCreateWithDate('${dateStr}')" data-date="${dateStr}">
          <span>${d}</span>
          ${!isPast ? '<span class="day-add">+</span>' : ''}
          ${dayEvents.length > 0 ? `<div class="event-dots">${dayEvents.slice(0,3).map(e => `<span style="background:${e.color || '#2a17cf'}"></span>`).join('')}${dayEvents.length > 3 ? '<span style="font-size:9px;color:#64748b;font-weight:700">+</span>' : ''}</div>` : ''}
        </div>`;
      }

      const remaining = (7 - (startDay + daysInMonth) % 7) % 7;
      for (let i = 0; i < remaining; i++) {
        html += '<div class="day-cell other"></div>';
      }

      grid.innerHTML = html;
    }

    function openCreateWithDate(dateStr) {
      const today = new Date().toISOString().split('T')[0];

      /* Block past dates */
      if (dateStr < today) {
        showToast('No puedes crear eventos en fechas pasadas', 'error');
        return;
      }

      const dayEvents = events.filter(e => e.event_date === dateStr);
      const date = new Date(dateStr + 'T12:00:00').toLocaleDateString('es-ES', { day:'numeric', month:'long', year:'numeric' });

      if (dayEvents.length > 0) {
        const existing = document.querySelector('.day-popup');
        if (existing) existing.remove();

        const cell = document.querySelector(`.day-cell[data-date="${dateStr}"]`);
        if (!cell) { openCreateWithDateSimple(dateStr); return; }

        const popup = document.createElement('div');
        popup.className = 'day-popup';
        popup.innerHTML = `
          <div class="dp-title">📅 ${date}</div>
          ${dayEvents.map(e => `<div class="dp-event"><span class="dp-dot" style="background:${e.color||'#2a17cf'}"></span>${e.title}${e.event_time ? ' · '+e.event_time : ''}</div>`).join('')}
          <button class="dp-add" onclick="this.closest('.day-popup').remove(); openCreateWithDateSimple('${dateStr}')">+ Nuevo evento en esta fecha</button>
        `;

        const rect = cell.getBoundingClientRect();
        popup.style.position = 'fixed';
        popup.style.left = Math.min(rect.left, window.innerWidth - 260) + 'px';
        popup.style.top = (rect.bottom + 8) + 'px';
        document.body.appendChild(popup);

        function closePopup(e) {
          if (!popup.contains(e.target) && e.target !== cell) {
            popup.remove();
            document.removeEventListener('click', closePopup);
          }
        }
        setTimeout(() => document.addEventListener('click', closePopup), 10);
      } else {
        openCreateWithDateSimple(dateStr);
      }
    }

    function openCreateWithDateSimple(dateStr) {
      openCreate();
      document.getElementById('editDate').value = dateStr;
    }

    function prevMonth() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); }
    function nextMonth() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); }

    function render() {
      const q = document.getElementById('searchEvents').value.toLowerCase();
      const filtered = events.filter(e => e.title.toLowerCase().includes(q) || (e.description && e.description.toLowerCase().includes(q)));
      const div = document.getElementById('eventsTable');
      if (filtered.length === 0) {
        div.innerHTML = '<div class="empty"><div class="empty-icon">📅</div><p>No hay eventos. Añade el primero.</p></div>';
        eventsPager.setTotal(0);
        return;
      }
      eventsPager.setTotal(filtered.length);
      const now = new Date();
      const todayStr = now.toISOString().split('T')[0];
      div.innerHTML = '<div class="table-wrap"><table><thead><tr><th>ID</th><th>Evento</th><th>Fecha</th><th>Hora</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>' +
        eventsPager.getPage(filtered).data.map(e => {
          const isPast = e.event_date < todayStr;
          return `
          <tr style="${isPast ? 'opacity:0.6' : ''}">
            <td><span class="cell-id">#${e.id}</span></td>
            <td><span class="cell-name" style="color:${e.color || '#2a17cf'}">${e.title}</span></td>
            <td>${new Date(e.event_date + 'T12:00:00').toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' })}</td>
            <td>${e.event_time || '—'}</td>
            <td><span class="badge ${isPast ? 'badge-read' : 'badge-unread'}">${isPast ? 'Pasado' : 'Próximo'}</span></td>
            <td class="actions">
              <button class="btn-edit btn-icon" onclick="openEdit(${e.id})" title="Editar">✏️</button>
              <button class="btn-delete btn-icon" onclick="deleteEvent(${e.id})" title="Eliminar">🗑️</button>
            </td>
          </tr>`;
        }).join('') + '</tbody></table></div>';
    }

    function openCreate() {
      editingId = null;
      document.getElementById('modalTitle').textContent = '➕ Nuevo evento';
      document.getElementById('saveBtn').textContent = 'Guardar';
      document.getElementById('editTitle').value = '';
      document.getElementById('editDescription').value = '';
      document.getElementById('editDate').value = '';
      document.getElementById('editTime').value = '';
      document.getElementById('editColor').value = '#2a17cf';
      document.getElementById('eventModal').classList.add('active');
    }

    function openEdit(id) {
      const e = events.find(x => x.id === id); if (!e) return;
      editingId = id;
      document.getElementById('modalTitle').textContent = '✏️ Editar evento';
      document.getElementById('saveBtn').textContent = 'Guardar cambios';
      document.getElementById('editTitle').value = e.title;
      document.getElementById('editDescription').value = e.description || '';
      document.getElementById('editDate').value = e.event_date;
      document.getElementById('editTime').value = e.event_time || '';
      document.getElementById('editColor').value = e.color || '#2a17cf';
      document.getElementById('eventModal').classList.add('active');
    }

    async function saveEvent() {
      const data = {
        title: document.getElementById('editTitle').value,
        description: document.getElementById('editDescription').value,
        event_date: document.getElementById('editDate').value,
        event_time: document.getElementById('editTime').value,
        color: document.getElementById('editColor').value
      };
      if (!data.title || !data.event_date) { showToast('Título y fecha son obligatorios', 'error'); return; }
      try {
        if (editingId) {
          const res = await API.admin.updateEvent(editingId, data);
          const idx = events.findIndex(x => x.id === editingId);
          if (idx >= 0) events[idx] = res.event;
          showToast('Evento actualizado', 'success');
        } else {
          const res = await API.admin.createEvent(data);
          events.push(res.event);
          showToast('Evento creado', 'success');
        }
        render();
        renderCalendar();
        closeModal();
      } catch (e) { showToast(e.error || 'Error', 'error'); }
    }

    async function deleteEvent(id) {
      if (!(await showConfirm('¿Eliminar este evento?'))) return;
      try {
        await API.admin.deleteEvent(id);
        events = events.filter(e => e.id !== id);
        render();
        renderCalendar();
        showToast('Evento eliminado', 'success');
      } catch (e) { showToast('Error', 'error'); }
    }

    function closeModal() { document.getElementById('eventModal').classList.remove('active'); editingId = null; }
    function showToast(msg, type) {
      const t = document.createElement('div'); t.className = 'toast ' + type; t.textContent = msg;
      document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
    }
  </script>
<script>
(function(){
  const btn = document.getElementById('adminThemeToggle');
  const icon = document.getElementById('adminThemeIcon');
  const label = document.getElementById('adminThemeLabel');
  if(btn){
    const isDark = document.documentElement.getAttribute('data-theme')==='dark';
    icon.textContent = isDark ? '☀️' : '🌙';
    label.textContent = isDark ? 'Modo claro' : 'Modo oscuro';
    btn.addEventListener('click', function(e){
      e.preventDefault();
      const dark = document.documentElement.getAttribute('data-theme') !== 'dark';
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      localStorage.setItem('theme', dark ? 'dark' : 'light');
      icon.textContent = dark ? '☀️' : '🌙';
      label.textContent = dark ? 'Modo claro' : 'Modo oscuro';
    });
  }
})();
</script>
</body>
</html>
