<!DOCTYPE html>
<html lang="es">
<head>
<script>if(localStorage.getItem('theme')==='dark'||(!localStorage.getItem('theme')&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finalizar Pedido - Academia Loranca</title>
  <link rel="shortcut icon" href="./imagenes/logo.png" type="image/png">
  <link rel="stylesheet" href="./parte-css/index.css">
  <script type="module" src="./parte-logica/Componentes/header.js" defer></script>
  <script type="module" src="./parte-logica/Componentes/footer.js" defer></script>
  <script src="./parte-logica/api.js"></script>
  <style>
    .auth-page {
      min-height: 80vh; display: flex; align-items: center; justify-content: center;
      padding: 60px 20px; background: #f8faff;
    }
    .auth-card {
      background: #ffffff; border-radius: 24px; padding: 48px 40px;
      width: 100%; max-width: 520px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.08);
      border: 1px solid rgba(59,130,246,0.08);
    }
    .auth-card h1 {
      font-size: 26px; color: #1e293b; margin-bottom: 4px; font-weight: 800; text-align: center;
    }
    .auth-sub { color: #64748b; font-size: 14px; margin-bottom: 28px; text-align: center; }
    .cart-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid #f1f5f9;
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-name { font-weight: 600; font-size: 14px; color: #1e293b; }
    .cart-item-teacher { font-size: 12px; color: #94a3b8; }
    .cart-item-price { font-weight: 700; font-size: 15px; color: #1e293b; }
    .cart-total {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0; margin-top: 8px; border-top: 2px solid #e2e8f0;
      font-size: 18px; font-weight: 800; color: #1e293b;
    }
    .payment-section { margin-top: 24px; }
    .payment-section h2 { font-size: 16px; font-weight: 700; color: #1e293b; margin-bottom: 16px; }
    .payment-row { display: flex; gap: 12px; }
    .payment-row .field { flex: 1; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label { font-weight: 600; font-size: 13px; color: #1e293b; }
    .field input {
      padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px;
      font-size: 15px; background: #f8fafc; color: #1e293b;
      transition: border-color 0.3s, box-shadow 0.3s; outline: none;
    }
    .field input:focus {
      border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); background: #fff;
    }
    .btn-auth {
      padding: 14px; margin-top: 6px; width: 100%;
      background: linear-gradient(60deg, #2f3f95, #000c8c);
      color: white; border: none; border-radius: 50px; font-weight: 700;
      font-size: 16px; cursor: pointer; transition: 0.3s;
      box-shadow: 0 8px 25px rgba(47,63,149,0.35);
    }
    .btn-auth:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 14px 35px rgba(47,63,149,0.45); }
    .btn-auth:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      display: inline-block; padding: 12px 28px; margin-top: 12px;
      background: transparent; border: 2px solid #e2e8f0; border-radius: 50px;
      font-weight: 600; font-size: 14px; color: #475569; text-decoration: none;
      transition: 0.3s;
    }
    .btn-secondary:hover { border-color: #2a17cf; color: #2a17cf; }
    .success-box {
      text-align: center; padding: 20px 0;
    }
    .success-box .checkmark {
      font-size: 64px; margin-bottom: 12px;
    }
    .success-box h2 { font-size: 22px; color: #16a34a; margin-bottom: 8px; }
    .success-box p { color: #64748b; font-size: 14px; margin-bottom: 6px; }
    .success-box .order-id { font-weight: 700; color: #1e293b; font-size: 16px; }
    .empty-cart { text-align: center; padding: 30px 0; }
    .empty-cart .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
    .empty-cart p { color: #94a3b8; font-size: 14px; margin-bottom: 16px; }
    .remove-btn {
      background: none; border: none; cursor: pointer; font-size: 16px;
      color: #94a3b8; padding: 4px 8px; border-radius: 6px; transition: 0.2s;
    }
    .remove-btn:hover { background: #fef2f2; color: #dc2626; }
    @media (max-width: 480px) {
      .auth-card { padding: 32px 24px; }
      .payment-row { flex-direction: column; }
    }
    [data-theme="dark"] .auth-page { background: var(--bg-body); }
    [data-theme="dark"] .auth-card { background: var(--bg-card); border-color: var(--border-color); box-shadow: 0 14px 40px rgba(0,0,0,0.2); }
    [data-theme="dark"] .auth-card h1 { color: var(--text-primary); }
    [data-theme="dark"] .auth-sub { color: var(--text-muted); }
    [data-theme="dark"] .field label { color: var(--text-primary); }
    [data-theme="dark"] .field input { background: var(--input-bg); color: var(--text-primary); border-color: var(--border-color); }
    [data-theme="dark"] .field input:focus { background: var(--bg-card); border-color: #3b82f6; }
    [data-theme="dark"] .cart-item { border-bottom-color: var(--border-color); }
    [data-theme="dark"] .cart-item-name { color: var(--text-primary); }
    [data-theme="dark"] .cart-item-price { color: var(--text-primary); }
    [data-theme="dark"] .cart-total { border-top-color: var(--border-color); color: var(--text-primary); }
    [data-theme="dark"] .payment-section h2 { color: var(--text-primary); }
    [data-theme="dark"] .success-box .order-id { color: var(--text-primary); }
  </style>
</head>
<body>
  <header-componente></header-componente>

  <main class="auth-page">
    <div class="auth-card" id="checkoutCard">
      <h1>Finalizar Pedido</h1>
      <p class="auth-sub">Revisa tu carrito y completa el pago</p>
      <div id="checkoutContent"></div>
    </div>
  </main>

  <footer-componente></footer-componente>

  <script>
    (() => {
      const content = document.getElementById('checkoutContent');

      function renderCart() {
        const cart = API.getCart();
        if (!cart.length) {
          content.innerHTML = `
            <div class="empty-cart">
              <div class="empty-icon">🛒</div>
              <p>Tu carrito está vacío</p>
              <a href="./grupos.html" class="btn-secondary">Ver cursos</a>
            </div>`;
          return;
        }

        content.innerHTML = `
          <div id="cartItems">
            ${cart.map((item, i) => `
              <div class="cart-item">
                <div>
                  <div class="cart-item-name">${item.course_name}</div>
                  <div class="cart-item-teacher">${item.teacher || ''}</div>
                </div>
                <div style="display:flex;align-items:center;gap:10px">
                  <span class="cart-item-price">${(item.price || 0).toFixed(2).replace('.',',')} €</span>
                  <button class="remove-btn" data-index="${i}" title="Eliminar">✕</button>
                </div>
              </div>
            `).join('')}
          </div>
          <div class="cart-total">
            <span>Total</span>
            <span>${API.getCartTotal().toFixed(2).replace('.',',')} €</span>
          </div>
          <div class="payment-section">
            <h2>💳 Datos de pago</h2>
            <div class="field">
              <label>Número de tarjeta</label>
              <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
            </div>
            <div class="payment-row">
              <div class="field">
                <label>Fecha de caducidad</label>
                <input type="text" id="cardExpiry" placeholder="MM/AA" maxlength="5">
              </div>
              <div class="field">
                <label>CVC</label>
                <input type="text" id="cardCvc" placeholder="123" maxlength="4">
              </div>
            </div>
            <button class="btn-auth" id="submitOrder">Pagar ${API.getCartTotal().toFixed(2).replace('.',',')} €</button>
          </div>`;

        content.querySelectorAll('.remove-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const idx = parseInt(btn.dataset.index);
            const cart2 = API.getCart();
            API.removeFromCart(cart2[idx].course_id);
            if (API.getCartCount() === 0) { renderCart(); return; }
            renderCart();
          });
        });

        document.getElementById('cardNumber')?.addEventListener('input', function() {
          this.value = this.value.replace(/\D/g, '').replace(/(.{4})/g, '$1 ').trim().substring(0, 19);
        });
        document.getElementById('cardExpiry')?.addEventListener('input', function() {
          this.value = this.value.replace(/\D/g, '').replace(/^(\d{2})/, '$1/').substring(0, 5);
        });
        document.getElementById('cardCvc')?.addEventListener('input', function() {
          this.value = this.value.replace(/\D/g, '').substring(0, 4);
        });

        document.getElementById('submitOrder').addEventListener('click', async () => {
          const btn = document.getElementById('submitOrder');
          btn.disabled = true; btn.textContent = 'Procesando...';
          const cartItems = API.getCart();
          try {
            const order = await API.createOrder(cartItems.map(i => ({
              course_id: i.course_id, course_name: i.course_name, price: i.price
            })));
            API.clearCart();
            content.innerHTML = `
              <div class="success-box">
                <div class="checkmark">✅</div>
                <h2>¡Pedido realizado!</h2>
                <p>Tu pedido se ha registrado correctamente.</p>
                <p class="order-id">Nº de pedido: #${order.id}</p>
                <p style="margin-top:12px;color:#64748b">Total: ${(order.total || API.getCartTotal()).toFixed(2).replace('.',',')} €</p>
                <a href="./index.html" class="btn-auth" style="display:inline-block;width:auto;margin-top:16px;text-decoration:none">Volver al inicio</a>
              </div>`;
          } catch (e) {
            showError(e.error || 'Error al procesar el pedido');
            btn.disabled = false; btn.textContent = 'Intentar de nuevo';
          }
        });
      }

      function showError(msg) {
        const existing = document.querySelector('.checkout-error');
        if (existing) existing.remove();
        const err = document.createElement('div');
        err.className = 'checkout-error';
        err.style.cssText = 'background:#fef2f2;color:#dc2626;padding:12px;border-radius:10px;font-size:14px;margin-bottom:20px;border:1px solid #fecaca';
        err.textContent = msg;
        content.prepend(err);
      }

      renderCart();
    })();
  </script>
</body>
</html>
