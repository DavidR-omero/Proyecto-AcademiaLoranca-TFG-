<!DOCTYPE html>
<html lang="es">
<head>
<script>if(localStorage.getItem('theme')==='dark'||(!localStorage.getItem('theme')&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse - Academia Loranca</title>
  <link rel="shortcut icon" href="./imagenes/logo.png" type="image/png">
  <link rel="stylesheet" href="./parte-css/index.css">
  <script type="module" src="./parte-logica/Componentes/header.js" defer></script>
  <script type="module" src="./parte-logica/Componentes/footer.js" defer></script>
  <script src="./parte-logica/api.js"></script>
  <style>
    .auth-page {
      min-height: 80vh; display: flex; align-items: center; justify-content: center;
      padding: 60px 20px; background: #f8faff;
    }
    .auth-card {
      background: #ffffff; border-radius: 24px; padding: 48px 40px;
      width: 100%; max-width: 420px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.08);
      text-align: center; border: 1px solid rgba(59,130,246,0.08);
    }
    .auth-logo { width: 80px; margin-bottom: 16px; }
    .auth-card h1 {
      font-size: 26px; color: #1e293b; margin-bottom: 4px; font-weight: 800;
    }
    .auth-sub { color: #64748b; font-size: 14px; margin-bottom: 28px; }
    .auth-error {
      background: #fef2f2; color: #dc2626; padding: 12px; border-radius: 10px;
      font-size: 14px; margin-bottom: 20px; border: 1px solid #fecaca; text-align: left;
    }
    .auth-success {
      background: #f0fdf4; color: #16a34a; padding: 12px; border-radius: 10px;
      font-size: 14px; margin-bottom: 20px; border: 1px solid #bbf7d0; text-align: left;
    }
    .auth-form { display: flex; flex-direction: column; gap: 18px; text-align: left; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-weight: 600; font-size: 13px; color: #1e293b; }
    .field input {
      padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px;
      font-size: 15px; background: #f8fafc; color: #1e293b;
      transition: border-color 0.3s, box-shadow 0.3s; outline: none;
    }
    .field input:focus {
      border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); background: #fff;
    }
    .btn-auth {
      padding: 14px; margin-top: 6px;
      background: linear-gradient(60deg, #2f3f95, #000c8c);
      color: white; border: none; border-radius: 50px; font-weight: 700;
      font-size: 16px; cursor: pointer; transition: 0.3s;
      box-shadow: 0 8px 25px rgba(47,63,149,0.35);
    }
    .btn-auth:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 14px 35px rgba(47,63,149,0.45); }
    .btn-auth:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-footer { margin-top: 24px; padding-top: 20px; border-top: 1px solid #e2e8f0; }
    .auth-footer p { font-size: 14px; color: #64748b; }
    .auth-footer a { color: #2563eb; font-weight: 600; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    @media (max-width: 480px) {
      .auth-card { padding: 32px 24px; }
    }
    [data-theme="dark"] .auth-page { background: var(--bg-body); }
    [data-theme="dark"] .auth-card { background: var(--bg-card); border-color: var(--border-color); box-shadow: 0 14px 40px rgba(0,0,0,0.2); }
    [data-theme="dark"] .auth-card h1 { color: var(--text-primary); }
    [data-theme="dark"] .auth-sub { color: var(--text-muted); }
    [data-theme="dark"] .field label { color: var(--text-primary); }
    [data-theme="dark"] .field input { background: var(--input-bg); color: var(--text-primary); border-color: var(--border-color); }
    [data-theme="dark"] .field input:focus { background: var(--bg-card); border-color: #3b82f6; }
    [data-theme="dark"] .auth-footer { border-top-color: var(--border-color); }
    [data-theme="dark"] .auth-footer p { color: var(--text-muted); }
    [data-theme="dark"] .auth-error { background: #3b1a1a; border-color: #6a2a2a; color: #fca5a5; }
    [data-theme="dark"] .auth-success { background: #1a3b2a; border-color: #2a5a3a; color: #86efac; }
  </style>
</head>
<body>
  <header-componente></header-componente>

  <main class="auth-page">
    <div class="auth-card">
      <img src="./imagenes/logo.png" alt="Academia Loranca" class="auth-logo">
      <h1>Crear Cuenta</h1>
      <p class="auth-sub">Regístrate para acceder a contenido exclusivo</p>
      <div id="authMessage" style="display:none"></div>

      <form id="registerForm" class="auth-form">
        <div class="field">
          <label>Nombre de usuario</label>
          <input type="text" id="username" name="username" required minlength="3" autocomplete="username" placeholder="Tu nombre de usuario">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="tu@email.com">
        </div>
        <div class="field">
          <label>Contraseña (mín. 4 caracteres)</label>
          <div style="position:relative">
            <input type="password" id="password" name="password" required minlength="4" autocomplete="new-password" placeholder="Tu contraseña" style="padding-right:44px">
            <span id="togglePass" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px;user-select:none;color:#94a3b8">👁️</span>
          </div>
        </div>
        <button type="submit" class="btn-auth" id="submitBtn">Crear Cuenta</button>
      </form>

      <div class="auth-footer">
        <p>¿Ya tienes cuenta? <a href="./login.html">Inicia sesión</a></p>
      </div>
    </div>
  </main>

  <footer-componente></footer-componente>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const msgDiv = document.getElementById('authMessage');
      btn.disabled = true; btn.textContent = 'Creando...';
      msgDiv.style.display = 'none';

      try {
        const data = await API.register(
          document.getElementById('username').value,
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        API.setSession(data);
        window.location.href = './panel.html';
      } catch (err) {
        msgDiv.className = 'auth-error';
        msgDiv.textContent = err.error || 'Error al registrarse';
        msgDiv.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Crear Cuenta';
      }
    });
  </script>
  <script>
    document.getElementById('togglePass').onclick = function() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      this.textContent = inp.type === 'password' ? '👁️' : '👁️‍🗨️';
    };
  </script>
</body>
</html>
